<!DOCTYPE html>
<html>

<head>

<title>Upload Content</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
margin-top:100px;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:80px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#45a049;
}

a{
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Upload Content</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<textarea name="text" placeholder="Enter text"></textarea>

<br><br>

<input type="file" name="file">

<br><br>

<button type="submit">Upload</button>

</form>

<a href="/">⬅ Back to Dashboard</a>

</div>

</body>
</html>
